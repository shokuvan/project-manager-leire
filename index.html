<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM & REM — Login</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">PEM <span>&</span> REM</div>
    <div class="login-sub">Project Monitoring System</div>

    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:24px;text-align:left">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px">Fitur Utama</div>
      <div style="display:flex;flex-direction:column;gap:6px;font-size:13px;color:var(--text)">
        <div>📅 Gantt Chart otomatis</div>
        <div>💰 Rencana Anggaran Biaya (RAB)</div>
        <div>📊 Monitoring realisasi lapangan</div>
        <div>📈 Analisis deviasi rencana vs aktual</div>
        <div>☁️ Data tersimpan di cloud (Firebase)</div>
      </div>
    </div>

    <button class="btn btn-google" id="btn-login" style="width:100%;justify-content:center">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.8 2.5 30.3 0 24 0 14.8 0 7 5.4 3.2 13.3l7.8 6C13 13.4 18.1 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
        <path fill="#FBBC05" d="M11 28.3A14.5 14.5 0 0 1 9.5 24c0-1.5.3-2.9.7-4.3l-7.8-6A24 24 0 0 0 0 24c0 3.9.9 7.5 2.5 10.8l8.5-6.5z"/>
        <path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.5-5.8c-2.2 1.5-5 2.3-8.4 2.3-5.9 0-11-3.9-12.8-9.3l-8.5 6.5C7 42.6 14.8 48 24 48z"/>
      </svg>
      Masuk dengan Google
    </button>

    <div id="login-error" style="display:none" class="alert alert-warn mt12"></div>

    <div style="margin-top:24px;font-size:11px;color:var(--muted);text-align:center">
      Data kamu aman tersimpan di Firebase.<br>Hanya kamu yang bisa akses proyekmu.
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script type="module">
  import { loginWithGoogle, redirectIfLoggedIn } from "./js/auth.js";

  // Redirect jika sudah login
  redirectIfLoggedIn();

  document.getElementById('btn-login').addEventListener('click', async () => {
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Menghubungkan...';
    try {
      await loginWithGoogle();
    } catch (e) {
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 48 48">...</svg> Masuk dengan Google`;
      document.getElementById('login-error').style.display = 'block';
      document.getElementById('login-error').textContent = 'Login gagal. Coba lagi.';
    }
  });
</script>
</body>
</html>
