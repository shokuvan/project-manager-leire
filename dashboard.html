<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PEM & REM — Dashboard</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="/dashboard.html" class="logo">PEM <span>&</span> REM <small>Project Manager</small></a>
  <div class="header-right">
    <img id="user-avatar" class="user-avatar" style="display:none" src="" alt="avatar">
    <span class="user-name" id="user-name"></span>
    <button class="btn btn-ghost btn-sm" id="btn-logout">Keluar</button>
  </div>
</div>

<!-- DASHBOARD -->
<div class="home-wrap">
  <div class="home-title">📁 Daftar Proyek</div>
  <div class="home-sub">Pilih proyek yang mau dibuka, atau buat proyek baru.</div>
  <div class="proj-grid" id="proj-grid">
    <div class="loading"><div class="spinner"></div> Memuat...</div>
  </div>
  <button class="btn-new-proj" id="btn-new-proj">
    <div class="plus-icon">＋</div>
    Buat Proyek Baru
  </button>
</div>

<!-- MODAL: Buat Proyek Baru -->
<div class="modal-overlay" id="modal-new-proj">
  <div class="modal">
    <div class="modal-title">🆕 Buat Proyek Baru</div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Nama Proyek</label>
      <input type="text" id="modal-proj-name" placeholder="Nama proyek...">
    </div>
    <div class="form-group">
      <label>Tanggal Mulai</label>
      <input type="date" id="modal-proj-start">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="btn-cancel-modal">Batal</button>
      <button class="btn btn-primary" id="btn-create-proj">Buat Proyek →</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
